name: Render Highlights Reel

# Triggered on demand only — either from the "Regenerate Highlights Reel"
# button in the site's admin Settings tab (which calls the workflow_dispatch
# API with the admin's PAT) or manually via `gh workflow run`. Deliberately
# NOT triggered by content pushes: rendering on every live-editor edit was
# retired in favor of explicit owner control.
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # needed to dispatch deploy.yml explicitly — see below

# Two overlapping runs (e.g. a manual trigger landing while a live-editor
# push also triggered one) each produce a commit that fully replaces
# public/highlights.mp4 — git can't 3-way-merge conflicting binary blobs,
# so a second run rebasing its own video commit onto a base that already
# has a *different* video from the first run fails outright. Only one
# render at a time; later triggers wait rather than run concurrently.
concurrency:
  group: render-highlights
  cancel-in-progress: false

jobs:
  render:
    # Rendered on the owner's own PC (i9-14900HX / RTX 4070 / 32GB) via a
    # self-hosted runner instead of GitHub's 2-vCPU, GPU-less ubuntu-latest
    # — the Render step is the bottleneck (real per-frame motion blur,
    # lossless PNG intermediates, CRF 14) and this hardware is dramatically
    # faster at it without giving up any of those quality settings. Only
    # this job moved; deploy.yml stays on ubuntu-latest since the site
    # deploy shouldn't depend on this specific PC being powered on.
    runs-on: [self-hosted, windows, museum-render]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The live editor stores fresh screenshots as base64 inside
      # projects.js — materialize them to real files here (not committed;
      # deploy.yml owns that commit) so the reel always has real image
      # paths to render, regardless of whether deploy.yml has run yet.
      - name: Install site dependencies
        run: npm ci

      - name: Extract embedded images (local only, not committed)
        run: node scripts/extract-images.mjs

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm ci

      - name: Fetch live stats (guestbook + appreciations)
        working-directory: remotion
        run: npm run fetch-stats
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Picks a random track (and a random ~100s window within it) from
      # music/cinematic/ on every run, so the reel gets a different piece
      # of music each time it regenerates — see scripts/select-score.mjs.
      - name: Select score
        working-directory: remotion
        run: npm run select-score

      - name: Render (16:9 master)
        working-directory: remotion
        run: npm run render

      - name: Render (9:16 vertical master)
        working-directory: remotion
        run: npx remotion render src/index.jsx HighlightsReelVertical out/highlights-vertical.mp4

      # A settled frame from the title slide — the site modal's poster, so
      # the (preload=none) player shows the reel's cover instead of black.
      - name: Render poster frame
        working-directory: remotion
        run: npx remotion still src/index.jsx HighlightsReel out/highlights-poster.jpg --frame=80

      # Visitors get the web encode (CRF 22 + faststart, a fraction of the
      # size); the CRF-14 masters go to workflow artifacts instead of
      # bloating the repo and every visitor's connection.
      - name: Web-encode for delivery
        working-directory: remotion
        shell: 'C:\PROGRA~1\Git\usr\bin\bash.exe -e -o pipefail {0}'
        run: |
          node scripts/web-encode.mjs out/highlights.mp4 out/highlights-web.mp4
          node scripts/web-encode.mjs out/highlights-vertical.mp4 out/highlights-vertical-web.mp4

      - name: Archive full-quality masters
        uses: actions/upload-artifact@v4
        with:
          name: highlights-masters
          path: |
            remotion/out/highlights.mp4
            remotion/out/highlights-vertical.mp4
          retention-days: 90

      # `shell: bash` alone resolves to whatever "bash" the runner's PATH
      # finds first — under the runner service's own (non-interactive)
      # PATH that turned out to be C:\Windows\System32\bash.exe, the WSL
      # shim, not Git Bash. WSL has no distro installed here, so it failed
      # immediately. Pointing at Git Bash's real path sidesteps PATH
      # ordering entirely. The runner's custom-shell field parser doesn't
      # respect quoting around the executable path (tried that — it left
      # the literal quote in place and broke PATH resolution), so the
      # 8.3 short path is used instead to dodge the space in
      # "Program Files" without needing to quote anything.
      - name: Publish rendered video
        shell: 'C:\PROGRA~1\Git\usr\bin\bash.exe -e -o pipefail {0}'
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Sync to the absolute latest main and discard everything local
          # (extract-images' and fetch-stats' uncommitted side effects,
          # which have already served their purpose) BEFORE copying in the
          # new video, rather than committing first and rebasing after.
          # public/highlights.mp4 is always a full replacement, never a
          # real merge — reset-then-commit makes that atomic and avoids
          # the binary-merge-conflict class of failure entirely, on top of
          # the concurrency group above removing the race that triggered
          # it here.
          git fetch origin main
          git reset --hard origin/main

          cp remotion/out/highlights-web.mp4 public/highlights.mp4
          cp remotion/out/highlights-vertical-web.mp4 public/highlights-vertical.mp4
          cp remotion/out/highlights-poster.jpg public/highlights-poster.jpg
          git add public/highlights.mp4 public/highlights-vertical.mp4 public/highlights-poster.jpg
          # `git diff --quiet` only compares tracked files against the
          # working tree — it silently reports "no difference" for a
          # brand-new untracked file. Diffing the staged version against
          # HEAD (--cached) catches new files too.
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate highlights reel"
            git push origin HEAD:main
            NEW_SHA=$(git rev-parse HEAD)

            # GitHub Actions does not trigger other workflows from a push
            # made with the default GITHUB_TOKEN (an anti-loop safeguard) —
            # deploy.yml's own push trigger would silently never fire for
            # this commit. The site's own deploy.yml sidesteps this by
            # doing its bot-commit and the actual build/deploy in the SAME
            # run; dispatching deploy.yml explicitly here is the equivalent
            # fix for a commit made from a separate workflow.
            #
            # Dispatching immediately after push is itself racy: observed
            # directly, a deploy fired right after this exact push built
            # the *previous* commit — GitHub's own ref-tracking for "main"
            # hadn't caught up yet even though the push had already
            # succeeded from git's point of view. Poll until the API
            # agrees the ref has moved before dispatching.
            for i in $(seq 1 15); do
              REMOTE_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)
              if [ "$REMOTE_SHA" = "$NEW_SHA" ]; then break; fi
              sleep 2
            done
            gh workflow run deploy.yml --repo "$GITHUB_REPOSITORY" --ref main
          fi
        env:
          GH_TOKEN: ${{ github.token }}
