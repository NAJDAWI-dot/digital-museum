name: Render Highlights Reel

# Triggered on demand only — either from the "Regenerate Highlights Reel"
# button in the site's admin Settings tab (which calls the workflow_dispatch
# API with the admin's PAT) or manually via `gh workflow run`. Deliberately
# NOT triggered by content pushes: rendering on every live-editor edit was
# retired in favor of explicit owner control.
on:
  workflow_dispatch:

permissions:
  contents: read

# This job no longer commits or pushes anything (see the note at the end of
# the job below — publishing moved to a manual Control Station step), but
# two renders still shouldn't run concurrently on the same self-hosted
# machine: they'd trample each other's remotion/out/ files and GPU. Only one
# render at a time; later triggers wait rather than run concurrently.
concurrency:
  group: render-highlights
  cancel-in-progress: false

jobs:
  render:
    # Rendered on the owner's own PC (i9-14900HX / RTX 4070 / 32GB) via a
    # self-hosted runner instead of GitHub's 2-vCPU, GPU-less ubuntu-latest
    # — the Render step is the bottleneck (real per-frame motion blur,
    # lossless PNG intermediates, CRF 14) and this hardware is dramatically
    # faster at it without giving up any of those quality settings. Only
    # this job moved; deploy.yml stays on ubuntu-latest since the site
    # deploy shouldn't depend on this specific PC being powered on.
    runs-on: [self-hosted, windows, museum-render]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # public/highlights*.mp4 and the poster jpg are tracked via Git LFS
      # (.gitattributes) so repeated regenerations don't keep bloating repo
      # history with full-size binary blobs, and so a future higher-quality
      # render can exceed GitHub's 100MB plain-git per-file block. Idempotent
      # — safe to run even if this runner already has LFS configured.
      - name: Ensure Git LFS is set up
        run: git lfs install

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The live editor stores fresh screenshots as base64 inside
      # projects.js — materialize them to real files here (not committed;
      # deploy.yml owns that commit) so the reel always has real image
      # paths to render, regardless of whether deploy.yml has run yet.
      - name: Install site dependencies
        run: npm ci

      - name: Extract embedded images (local only, not committed)
        run: node scripts/extract-images.mjs

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm ci

      - name: Fetch live stats (guestbook + appreciations)
        working-directory: remotion
        run: npm run fetch-stats
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Automated editorial pass: reviews the real project content (incl.
      # cover images) and picks which projects star, section on/off toggles,
      # photos-per-project, and a fitting music track — written into
      # reel-config.json/render-settings.json BEFORE Select score runs, so
      # select-score.mjs picks up any pinned track through its existing
      # path. Runs a headless `claude` CLI invocation using whatever Claude
      # Code login is already active on this self-hosted runner (the
      # owner's own PC) — no API key/secret needed. Never fails the render:
      # on any error (CLI missing/not logged in, malformed output) it
      # leaves today's defaults (random track, featured-first order) in
      # place. See remotion/scripts/agent-edit.mjs.
      - name: Run editing agent
        working-directory: remotion
        run: npm run agent-edit

      # Picks a random track (and a random ~100s window within it) from
      # music/cinematic/ on every run, so the reel gets a different piece
      # of music each time it regenerates — see scripts/select-score.mjs.
      # (Unless the editing agent above already pinned one.)
      - name: Select score
        working-directory: remotion
        run: npm run select-score

      - name: Render (16:9 master)
        working-directory: remotion
        run: npm run render

      - name: Render (9:16 vertical master)
        working-directory: remotion
        run: npx remotion render src/index.jsx HighlightsReelVertical out/highlights-vertical.mp4 --hardware-acceleration=if-possible

      # A settled frame from the title slide — the site modal's poster, so
      # the (preload=none) player shows the reel's cover instead of black.
      - name: Render poster frame
        working-directory: remotion
        run: npx remotion still src/index.jsx HighlightsReel out/highlights-poster.jpg --frame=80

      # Visitors get the web encode (CRF 22 + faststart, a fraction of the
      # size); the CRF-14 masters go to workflow artifacts instead of
      # bloating the repo and every visitor's connection.
      - name: Web-encode for delivery
        working-directory: remotion
        shell: 'C:\PROGRA~1\Git\usr\bin\bash.exe -e -o pipefail {0}'
        run: |
          node scripts/web-encode.mjs out/highlights.mp4 out/highlights-web.mp4
          node scripts/web-encode.mjs out/highlights-vertical.mp4 out/highlights-vertical-web.mp4

      # QA pass on the rendered master — advisory only (see remotion/scripts/agent-review.mjs).
      # Same headless `claude` CLI approach as the editing agent above, no
      # API key needed. Never fails the render or blocks publishing; the
      # report just sits alongside the video for the human review step below.
      - name: Run QA review
        working-directory: remotion
        run: npm run agent-review

      - name: Archive full-quality masters
        uses: actions/upload-artifact@v4
        with:
          name: highlights-masters
          path: |
            remotion/out/highlights.mp4
            remotion/out/highlights-vertical.mp4
          retention-days: 90

      # This job intentionally stops here — it no longer auto-publishes.
      # The editing agent above now makes real creative calls (project
      # selection/order, section toggles, music) worth a human glance
      # before they go live, so publishing is a separate, explicit step
      # done from the Control Station (remotion/control-station) on this
      # same machine — the self-hosted runner IS the owner's own PC, so
      # the rendered files in remotion/out/ (plus agent-edit.json and
      # agent-review.json) are already sitting where Control Station reads
      # them. Open it, review the editor's decisions and QA verdict, watch
      # the preview, and hit Publish when ready.
