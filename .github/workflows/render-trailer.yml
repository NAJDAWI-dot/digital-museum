name: Render Project Trailer

# Renders a 15-second single-exhibit teaser (remotion/src/ProjectTrailer.jsx)
# for the project id passed at dispatch — triggered from the admin app's
# "Render trailer" button. Output is web-encoded and committed to
# public/trailers/<id>.mp4.
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project id (from src/data/projects.js) to render a trailer for'
        required: true
        type: string

permissions:
  contents: read

# This job no longer commits or pushes anything (publishing moved to a
# manual Control Station step — see the note at the end of the job below),
# but still shares the render-highlights group: two heavy renders on the
# same self-hosted machine shouldn't run concurrently and trample each
# other's remotion/out/ files and GPU.
concurrency:
  group: render-highlights
  cancel-in-progress: false

jobs:
  render:
    runs-on: [self-hosted, windows, museum-render]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install site dependencies
        run: npm ci

      - name: Extract embedded images (local only, not committed)
        run: node scripts/extract-images.mjs

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm ci

      - name: Select score
        working-directory: remotion
        run: npm run select-score

      - name: Render trailer
        working-directory: remotion
        shell: 'C:\PROGRA~1\Git\usr\bin\bash.exe -e -o pipefail {0}'
        run: |
          # npx (unlike node/git/gh, which are .exe) is a shell script whose
          # `#!/usr/bin/env bash` shebang resolves through PATH. The runner
          # starts this bash non-login, so PATH is the service PATH where
          # C:\Windows\System32 (the WSL bash stub) precedes Git's bin — env
          # finds WSL bash and dies with "no installed distributions". Put
          # Git's own /usr/bin first so the shebang lands on Git bash.
          export PATH="/usr/bin:$PATH"
          npx remotion render src/index.jsx ProjectTrailer out/trailer.mp4 \
            --props="{\"projectId\":\"${{ inputs.project_id }}\"}"
          node scripts/web-encode.mjs out/trailer.mp4 out/trailer-web.mp4

      - name: Archive trailer
        uses: actions/upload-artifact@v4
        with:
          name: trailer-${{ inputs.project_id }}
          path: remotion/out/trailer.mp4
          retention-days: 90

      # This job intentionally stops here — it no longer auto-publishes.
      # remotion/control-station now has a matching "Project Trailer"
      # section (Render + Publish Trailer) — since the self-hosted runner
      # is the same PC Control Station runs on, out/trailer-web.mp4 is
      # already sitting there. Open Control Station, pick this project,
      # preview, and hit Publish Trailer when ready.
